<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betaling vellykket — Brann Ultras</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span class="logo-fire">🔥</span><span>BRANN ULTRAS</span></a>
  </nav>
  <div class="result-page" id="result-page">
    <!-- Fylles av JS basert på URL -->
  </div>
  <script>
    const isCancel = window.location.pathname.includes('cancel');
    document.getElementById('result-page').innerHTML = isCancel ? `
      <div class="result-box">
        <div class="result-icon">😕</div>
        <h1>Betaling avbrutt</h1>
        <p>Ingen betaling ble gjennomført. Du kan gå tilbake og prøve igjen.</p>
        <a href="produkter.html" class="btn-primary">Tilbake til stickers</a>
      </div>
    ` : `
      <div class="result-box success">
        <div class="result-icon">🎉</div>
        <h1>Takk for bestillingen!</h1>
        <p>Vi har mottatt betalingen din og setter i gang produksjonen. Du vil få en bekreftelse på e-post.</p>
        <p><strong>Leveringstid: 2–4 hverdager.</strong></p>
        <a href="index.html" class="btn-primary">Tilbake til forsiden</a>
      </div>
    `;
  </script>
</body>
</html>
